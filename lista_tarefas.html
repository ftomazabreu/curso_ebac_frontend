<!DOCTYPE html>
<html lang="pt-BR">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lista de Tarefas - jQuery</title>
      <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
      <style>
                * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                }

                body {
                              font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                              min-height: 100vh;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              padding: 20px;
                }

                .container {
                              background: white;
                              border-radius: 10px;
                              box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                              padding: 30px;
                              width: 100%;
                              max-width: 500px;
                }

                h1 {
                              color: #333;
                              margin-bottom: 30px;
                              text-align: center;
                              font-size: 28px;
                }

                .form-group {
                              display: flex;
                              gap: 10px;
                              margin-bottom: 30px;
                }

                input[type="text"] {
                              flex: 1;
                              padding: 12px;
                              border: 2px solid #ddd;
                              border-radius: 5px;
                              font-size: 16px;
                              transition: border-color 0.3s;
                }

                input[type="text"]:focus {
                              outline: none;
                              border-color: #667eea;
                }

                button {
                              padding: 12px 25px;
                              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                              color: white;
                              border: none;
                              border-radius: 5px;
                              cursor: pointer;
                              font-size: 16px;
                              font-weight: bold;
                              transition: transform 0.2s, box-shadow 0.2s;
                }

                button:hover {
                              transform: translateY(-2px);
                              box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
                }

                button:active {
                              transform: translateY(0);
                }

                ul {
                              list-style: none;
                }

                li {
                              padding: 15px;
                              background: #f9f9f9;
                              border-left: 4px solid #667eea;
                              margin-bottom: 10px;
                              border-radius: 3px;
                              cursor: pointer;
                              transition: all 0.3s;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                }

                li:hover {
                              background: #f0f0f0;
                }

                li.completed {
                              text-decoration: line-through;
                              color: #999;
                              background: #f0f0f0;
                }

                .delete-btn {
                              background: #dc3545;
                              color: white;
                              border: none;
                              padding: 5px 10px;
                              border-radius: 3px;
                              cursor: pointer;
                              font-size: 14px;
                }

                .delete-btn:hover {
                              background: #c82333;
                }

                .empty-message {
                              text-align: center;
                              color: #999;
                              padding: 30px;
                }
            </style>
  </head>
  <body>
        <div class="container">
                  <h1>📝 Lista de Tarefas</h1>
                
                <div class="form-group">
                            <input type="text" id="tarefaInput" placeholder="Digite uma nova tarefa...">
                            <button id="adicionarBtn">Adicionar</button>button>
                </div>div>
                
                <ul id="tarefasLista">
                            <div class="empty-message">Nenhuma tarefa ainda. Adicione uma!</div>div>
                </ul>ul>
        </div>div>
      
      <script>
                $(document).ready(function() {
                              // Referências dos elementos
                              const $input = $('#tarefaInput');
                              const $lista = $('#tarefasLista');
                              const $btnAdicionar = $('#adicionarBtn');

                              // Função para adicionar tarefa
                              function adicionarTarefa() {
                                                const tarefaTexto = $input.val().trim();

                                                if (tarefaTexto === '') {
                                                                      alert('Por favor, digite uma tarefa!');
                                                                      return;
                                                }

                                                // Criar elemento da tarefa
                                                const $tarefa = $('<li></li>');
                                                $tarefa.html(`
                                                                    <span>${tarefaTexto}</span>
                                                                                        <button class="delete-btn">Deletar</button>
                                                                                                        `);

                                                // Adicionar à lista
                                                if ($lista.find('.empty-message').length > 0) {
                                                                      $lista.empty();
                                                }
                                                $lista.append($tarefa);

                                                // Limpar input
                                                $input.val('');
                                                $input.focus();

                                                // Evento de clique para marcar como completa
                                                $tarefa.on('click', function(e) {
                                                                      if ($(e.target).hasClass('delete-btn')) {
                                                                                                return;
                                                                      }
                                                                      $(this).toggleClass('completed');
                                                });

                                                // Evento de deletar
                                                $tarefa.find('.delete-btn').on('click', function() {
                                                                      $tarefa.remove();

                                                                      // Mostrar mensagem se lista vazia
                                                                      if ($lista.find('li').length === 0) {
                                                                                                $lista.html('<div class="empty-message">Nenhuma tarefa ainda. Adicione uma!</div>');
                                                                      }
                                                });
                              }

                              // Eventos
                              $btnAdicionar.on('click', adicionarTarefa);

                              $input.on('keypress', function(e) {
                                                if (e.which === 13) { // Enter key
                                                                      adicionarTarefa();
                                                }
                              });
                });
      </script>
  </body>
</html>html>
      </script></h1>
  </body>
      </style></title>
  </head>
