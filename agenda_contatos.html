<!DOCTYPE html>
  <html lang="pt-BR">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Agenda de Contatos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
}

        body {
                      font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
}

        .container {
                      max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            overflow: hidden;
}

        .header {
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
}

        .header h1 {
                      font-size: 28px;
            margin-bottom: 10px;
}

        .content {
                      padding: 30px;
        }

        .form-section {
                      margin-bottom: 30px;
}

        .form-group {
                      margin-bottom: 15px;
}

        label {
                      display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
}

        input[type="text"],
                  input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
                  input[type="tel"]:focus {
                      outline: none;
            border-color: #667eea;
        }

        .button-group {
                      display: flex;
            gap: 10px;
            margin-top: 20px;
}

        button {
                      flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
}

        .btn-register {
                      background: #667eea;
            color: white;
        }

        .btn-register:hover {
                      background: #764ba2;
}

        .btn-clear {
                      background: #ccc;
                      color: #333;
}

        .btn-clear:hover {
                      background: #aaa;
                      }

        .table-section {
                      margin-top: 30px;
}

        .table-section h2 {
                      color: #333;
            margin-bottom: 15px;
            font-size: 20px;
}

        table {
                      width: 100%;
            border-collapse: collapse;
            background: white;
}

        thead {
                      background: #667eea;
            color: white;
}

        th {
                      padding: 15px;
            text-align: left;
            font-weight: bold;
}

        td {
                      padding: 12px 15px;
            border-bottom: 1px solid #ddd;
              }

        tbody tr:hover {
                          background: #f5f5f5;
              }

        .btn-delete {
                          background: #e74c3c;
                                      color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            }

        .btn-delete:hover {
                      background: #c0392b;
          }

                  .empty-message {
                      text-align: center;
            color: #999;
            padding: 30px;
            font-size: 16px;
}
    </style>
      </head>
      <body>
          <div class="container">
              <div class="header">
                  <h1>📞 Agenda de Contatos</h1>
            <p>Gerenciador de contatos simples e prático</p>
              </div>

              <div class="content">
                  <!-- Formulário de Cadastro -->
                  <div class="form-section">
                      <h2 style="margin-bottom: 20px; color: #333;">Adicionar Novo Contato</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite o nome..." required>
                          </div>

                          <div class="form-group">
                              <label for="telefone">Telefone:</label>
                              <input type="tel" id="telefone" name="telefone" placeholder="Digite o telefone..." required>
                          </div>

                          <div class="button-group">
                              <button type="submit" class="btn-register">Cadastrar Contato</button>
                              <button type="reset" class="btn-clear">Limpar</button>
                          </div>
                      </form>
                  </div>

                  <!-- Tabela de Contatos -->
                  <div class="table-section">
                      <h2>Meus Contatos</h2>
                      <table id="contactTable">
                          <thead>
                              <tr>
                                  <th>Nome</th>
                                  <th>Telefone</th>
                                  <th>Ação</th>
                              </tr>
                          </thead>
                          <tbody id="tableBody">
                              <tr>
                                  <td colspan="3" class="empty-message">Nenhum contato cadastrado ainda</td>
                              </tr>
                          </tbody>
                      </table>
                  </div>
              </div>
          </div>

          <script>
              const contactForm = document.getElementById('contactForm');
        const nomeInput = document.getElementById('nome');
        const telefoneInput = document.getElementById('telefone');
        const tableBody = document.getElementById('tableBody');
        let contacts = [];

        // Carregar contatos do localStorage
        function loadContacts() {
                      const saved = localStorage.getItem('contacts');
            if (saved) {
                contacts = JSON.parse(saved);
                renderTable();
            }
        }

        // Salvar contatos no localStorage
        function saveContacts() {
                      localStorage.setItem('contacts', JSON.stringify(contacts));
        }

        // Renderizar tabela
        function renderTable() {
                      if (contacts.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="empty-message">Nenhum contato cadastrado ainda</td></tr>';
                return;
                      }

            tableBody.innerHTML = contacts.map((contact, index) => `
                              <tr>
                                  <td>${contact.nome}</td>
                                  <td>${contact.telefone}</td>
                                  <td>
                                      <button class="btn-delete" onclick="deleteContact(${index})">Deletar</button>
                                  </td>
                              </tr>
                          `).join('');
        }

        // Adicionar contato
        contactForm.addEventListener('submit', function(e) {
                      e.preventDefault();

            const nome = nomeInput.value.trim();
            const telefone = telefoneInput.value.trim();

            if (nome && telefone) {
                contacts.push({nome, telefone});
                saveContacts();
                renderTable();
                contactForm.reset();
                nomeInput.focus();
            } else {
                alert('Por favor, preencha todos os campos!');
            }
        });

        // Deletar contato
        function deleteContact(index) {
                      if (confirm('Deseja realmente deletar este contato?')) {
                contacts.splice(index, 1);
                saveContacts();
                renderTable();
                      }
        }

        // Carregar contatos ao iniciar
        loadContacts();
    </script>
      </body>
      </html>
