<!DOCTYPE html>
  <html lang="pt-BR">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Exercício Módulo 7 - Validação de Formulário</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
}

        body {
                      font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
}

        .container {
                      background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
}

        h1 {
                      text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
}

        .form-group {
            margin-bottom: 20px;
}

        label {
                      display: block;
            margin-bottom: 8px;
                      color: #555;
            font-weight: bold;
            font-size: 14px;
}

        input[type="number"] {
            width: 100%;
                          padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
                          transition: border-color 0.3s;
}

        input[type="number"]:focus {
                      outline: none;
                          border-color: #667eea;
}

        button {
                          width: 100%;
                      padding: 12px;
                      background: #667eea;
            color: white;
                      border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
}

        button:hover {
                                    background: #764ba2;
          }

        .message {
            margin-top: 20px;
                      padding: 15px;
                      border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
}

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
}

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
                      border: 1px solid #f5c6cb;
                      display: block;
}
    </style>
</head>
              <body>
    <div class="container">
        <h1>Validação de Números</h1>
        <form id="formulario">
                      <div class="form-group">
                <label for="campoA">Campo A:</label>
                <input type="number" id="campoA" name="campoA" required>
                          </div>

            <div class="form-group">
                <label for="campoB">Campo B:</label>
                          <input type="number" id="campoB" name="campoB" required>
            </div>

            <button type="submit">Validar</button>
        </form>

                      <div id="mensagem" class="message"></div>
    </div>

    <script>
        const formulario = document.getElementById('formulario');
                                const campoA = document.getElementById('campoA');
                      const campoB = document.getElementById('campoB');
        const mensagem = document.getElementById('mensagem');

                  formulario.addEventListener('submit', function(e) {
            e.preventDefault();

            const valorA = parseFloat(campoA.value);
            const valorB = parseFloat(campoB.value);

            // Limpar mensagens anteriores
            mensagem.classList.remove('success', 'error');
            mensagem.textContent = '';

            // Validar se B é maior que A
                      if (valorB > valorA) {
                mensagem.classList.add('success');
                mensagem.textContent = '✓ Parabéns! O formulário é válido. Campo B é maior que Campo A.';
                      } else {
                mensagem.classList.add('error');
                mensagem.textContent = '✗ Formulário inválido! Campo B deve ser maior que Campo A.';
                      }
                  });
    </script>
      </body>
      </html>
